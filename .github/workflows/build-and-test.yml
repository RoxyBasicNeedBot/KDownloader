name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Kotlin Multiplatform (Android + Desktop JVM) ───
  build-kmp:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build Core + Android + Desktop
        run: ./gradlew build --no-daemon

  # ─── iOS Framework (macOS only) ───
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build iOS XCFramework
        run: ./gradlew :kdownloader-core:assembleXCFramework

  # ─── C# .NET Build ───
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Link Linux Native Shared Binary
        run: |
          ./gradlew :kdownloader-dotnet-native:linkReleaseSharedNativeLinux
        continue-on-error: true

  # ─── Flutter Plugin ───
  build-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Flutter Pub Get
        run: |
          if [ -d "kdownloader-flutter" ]; then
            cd kdownloader-flutter && flutter pub get
          fi
        shell: bash
