name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build all platform artifacts first ───
  build:
    uses: ./.github/workflows/build-and-test.yml

  # ─── Publish to Maven Central ───
  publish-maven:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Publish Android/JVM/iOS targets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon
        continue-on-error: true

  # ─── Publish C# Wrapper to NuGet ───
  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build NuGet Package
        run: |
          if [ -d "kdownloader-dotnet" ]; then
            dotnet pack kdownloader-dotnet/src/KDownloader/KDownloader.csproj -c Release
          fi
        shell: bash
      - name: Push to NuGet
        run: |
          if [ -f "kdownloader-dotnet/src/KDownloader/bin/Release/*.nupkg" ]; then
            dotnet nuget push 'kdownloader-dotnet/src/KDownloader/bin/Release/*.nupkg' -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }}
          fi
        shell: bash
        continue-on-error: true

  # ─── Publish Flutter Plugin to pub.dev ───
  publish-flutter:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Publish package
        run: |
          if [ -d "kdownloader-flutter" ]; then
            cd kdownloader-flutter
            # In CI, pub.dev requires OAuth credentials setup. This is a stub showing the command.
            # dart pub publish --force
          fi
        shell: bash
        continue-on-error: true

  # ─── Create GitHub Release with Changelog ───
  github-release:
    needs: [publish-maven, publish-nuget, publish-flutter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Changelog
        id: changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s (%h)" > changelog.txt
        shell: bash
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.txt
          generate_release_notes: true
