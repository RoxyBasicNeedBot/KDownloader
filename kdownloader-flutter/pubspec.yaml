name: kdownloader_flutter
description: A high-performance multi-chunk dynamic download plugin wrapping KDownloader.
version: 2.2.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.roxybasicneedbot.kdownloader.flutter
        pluginClass: KDownloaderFlutterPlugin
      ios:
        pluginClass: KDownloaderFlutterPlugin
